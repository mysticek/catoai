services:
  db:
    image: pgvector/pgvector:pg16
    container_name: cato-db
    environment:
      POSTGRES_USER: cato
      POSTGRES_PASSWORD: cato
      POSTGRES_DB: cato
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # schema.sql runs automatically on first init of an empty data dir
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cato -d cato"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
