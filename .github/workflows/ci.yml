name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  agent:
    name: Agent + shared (build, typecheck, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run build
      - run: npm run typecheck
      - run: npm test

  mobile:
    name: Mobile (typecheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - working-directory: packages/mobile
        run: npm install
      - working-directory: packages/mobile
        run: npx tsc --noEmit
